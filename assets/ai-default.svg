<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- AI brain/network icon -->
  <circle cx="400" cy="180" r="50" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="180" r="30" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
  <circle cx="400" cy="180" r="12" fill="#2563EB" opacity="0.8"/>
  <!-- Neural connections -->
  <g stroke="#2563EB" stroke-width="0.8" opacity="0.5" fill="none">
    <line x1="400" y1="180" x2="280" y2="100"/>
    <line x1="400" y1="180" x2="520" y2="100"/>
    <line x1="400" y1="180" x2="280" y2="260"/>
    <line x1="400" y1="180" x2="520" y2="260"/>
    <line x1="400" y1="180" x2="400" y2="60"/>
    <line x1="400" y1="180" x2="400" y2="300"/>
    <line x1="400" y1="180" x2="250" y2="180"/>
    <line x1="400" y1="180" x2="550" y2="180"/>
  </g>
  <!-- Dots at end of connections -->
  <g fill="#2563EB" opacity="0.4">
    <circle cx="280" cy="100" r="4"/>
    <circle cx="520" cy="100" r="4"/>
    <circle cx="280" cy="260" r="4"/>
    <circle cx="520" cy="260" r="4"/>
    <circle cx="400" cy="60" r="4"/>
    <circle cx="400" cy="300" r="4"/>
    <circle cx="250" cy="180" r="4"/>
    <circle cx="550" cy="180" r="4"/>
  </g>
  <!-- Text -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#64748B" letter-spacing="4">AI TECHNOLOGY</text>
</svg>
